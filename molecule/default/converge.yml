---
- name: Converge Nautobot Docker
  hosts: all
  become: true
  gather_facts: true
  vars:
    nautobot__home: "{{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') | default('/tmp/molecule', true) }}/nautobot"
    nautobot__port_http: 18080
    nautobot__port_https: 18443
    nautobot__ports:
      - "{{ nautobot__port_http }}:8080"
      - "{{ nautobot__port_https }}:8443"
    nautobot__network: 'test_nautobot_network'
    nautobot__network_cidr: '172.16.23.0/24'
    nautobot__remove_existing_container: false
    nautobot__remove_existing_home_dir: false
    nautobot__pip_install_extra_args: '--break-system-packages'
  pre_tasks:
    - name: Override Nautobot volumes for Molecule workspace
      ansible.builtin.set_fact:
        nautobot__directory_volumes:
          - "{{ nautobot__home }}/config:/opt/nautobot/config"
        nautobot__file_volumes: []

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 600
      when: ansible_os_family == 'Debian'

    - name: Check if Docker socket exists
      ansible.builtin.stat:
        path: /var/run/docker.sock
      register: docker_socket

    - name: Fail if Docker socket is unavailable
      ansible.builtin.fail:
        msg: "Docker socket not available inside Molecule instance."
      when: not docker_socket.stat.exists

  roles:
    - role: bsmeding.nautobot_docker
  post_tasks:
    - name: Wait for Nautobot HTTP endpoint during converge
      ansible.builtin.command: >
        docker exec {{ nautobot__name }} curl -fsS -o /dev/null http://127.0.0.1:8080
      register: nautobot_http_ready_converge
      retries: 120
      delay: 5
      until: nautobot_http_ready_converge.rc == 0
      changed_when: false
      failed_when: false

    - name: Gather Nautobot container logs when converge HTTP wait fails
      ansible.builtin.command: "docker logs --tail 200 {{ nautobot__name }}"
      register: nautobot_converge_container_logs
      changed_when: false
      when: nautobot_http_ready_converge.rc != 0

    - name: Assert Nautobot HTTP endpoint became ready during converge
      ansible.builtin.assert:
        that:
          - nautobot_http_ready_converge.rc == 0
        fail_msg: >-
          Nautobot HTTP endpoint did not become ready during converge.
          Recent logs:
          {{ (nautobot_converge_container_logs.stdout | default('No logs available'))[:4000] }}
